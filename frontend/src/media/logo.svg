  </defs>

  <!-- Leaf shape -->
  <path d="M58 18 C58 18 95 22 100 55 C105 88 78 112 58 118 C38 112 11 88 16 55 C21 22 58 18 58 18 Z" fill="url(#leafG)" opacity="0.95"/>
