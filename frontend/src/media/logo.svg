      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    <linearGradient id="scanG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#67E8F9"/>
      <stop offset="100%" style="stop-color:#A5B4FC"/>
