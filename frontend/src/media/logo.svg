  <path d="M58 64 C66 68 78 68 82 72" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M58 80 C66 84 76 85 80 89" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Scan line -->
  <line x1="12" y1="70" x2="104" y2="70" stroke="url(#scanG)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="12" cy="70" r="3.5" fill="#67E8F9"/>
  <circle cx="104" cy="70" r="3.5" fill="#A5B4FC"/>

  <!-- Corner brackets -->
  <path d="M18 30 L18 18 L30 18" fill="none" stroke="#67E8F9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M86 18 L98 18 L98 30" fill="none" stroke="#67E8F9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M18 110 L18 122 L30 122" fill="none" stroke="#A5B4FC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M86 122 L98 122 L98 110" fill="none" stroke="#A5B4FC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark: "Nutri" white, "Scan" gradient -->
  <text x="130" y="90" font-family="'Georgia', 'Times New Roman', serif" font-size="58" font-weight="700" fill="#f0fdf4" letter-spacing="-1">Nutri</text>
  <text x="288" y="90" font-family="'Georgia', 'Times New Roman', serif" font-size="58" font-weight="700" fill="url(#scanG)" letter-spacing="-1">Scan</text>

  <!-- Tagline -->
  <text x="131" y="116" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="rgba(240,253,244,0.45)" letter-spacing="3.5">SMART NUTRITION SCANNER</text>
