  <line x1="58" y1="22" x2="58" y2="114" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-linecap="round"/>
  <!-- Side veins -->
  <path d="M58 48 C50 53 40 54 35 58" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.4" stroke-linecap="round"/>
